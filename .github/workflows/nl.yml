name: Record m3u8 → Internet Archive (مخبأ 10000 ms فقط)

on:
  workflow_dispatch:
    inputs:
      m3u8_url:
        description: 'رابط m3u8'
        required: true
      duration_minutes:
        description: 'مدة التسجيل بالدقايق'
        required: true
        default: '60'
      title:
        description: 'عنوان التسجيل'
        required: false
        default: 'تسجيل حدث مهم'

jobs:
  record-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: تثبيت الأدوات
        run: |
          sudo apt update && sudo apt install -y ffmpeg
          pip install --upgrade internetarchive

      - name: تسجيل البث (مخبأ 10000 ms فقط)
        run: |
          MINUTES="${{ inputs.duration_minutes }}"
          DURATION_SECONDS=$((MINUTES * 60))

          OUTPUT_FILE="record_$(date +%Y%m%d_%H%M%S).ts"

          echo "بدء التسجيل لمدة ${MINUTES} دقيقة - مخبأ 10000 ms فقط"

          ffmpeg \
            -i "${{ inputs.m3u8_url }}" \
            -max_delay 10000000 \          # ← 10000 ms فقط (كما طلبت)
            -t "$DURATION_SECONDS" \
            -c copy \
            -y "$OUTPUT_FILE" 2> ffmpeg.log || true

          # فحص الملف
          if [ ! -s "$OUTPUT_FILE" ] || [ $(stat -c %s "$OUTPUT_FILE") -lt 1000000 ]; then
            echo "⚠️ تحذير: الملف فارغ أو صغير"
            cat ffmpeg.log
          else
            echo "✅ تم التسجيل بنجاح"
          fi

          echo "output_file=$OUTPUT_FILE" >> $GITHUB_ENV
          echo "size_mb=$(du -m "$OUTPUT_FILE" | cut -f1)" >> $GITHUB_ENV

      - name: رفع إلى Internet Archive
        env:
          IA_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
        run: |
          python3 - <<'EOF'
          from internetarchive import upload
          import os
          from datetime import datetime

          FIXED_IDENTIFIER = "m3u8-tasjilat-mohamed-2026"
          file_path = os.environ.get('output_file')
          file_title = "${{ inputs.title }}" or f"تسجيل ${datetime.now().strftime('%Y-%m-%d %H:%M')}"

          metadata = {
              'title': 'تسجيلات أحداث مهمة',
              'description': 'تسجيل m3u8 - Playlist ثابتة',
              'mediatype': 'movies',
              'collection': 'opensource_movies',
              'creator': 'Mohamed'
          }

          upload(
              FIXED_IDENTIFIER,
              files=[{'name': file_path, 'title': file_title}],
              metadata=metadata,
              access_key=os.environ['IA_ACCESS_KEY'],
              secret_key=os.environ['IA_SECRET_KEY'],
              verbose=True,
              retries=3
          )
          print("✅ تم الرفع")
          EOF

      - name: عرض النتيجة
        if: always()
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "المدة   : ${{ inputs.duration_minutes }} دقيقة"
          echo "الحجم   : ${{ env.size_mb }} MB"
          echo "الرابط  : https://archive.org/details/m3u8-tasjilat-mohamed-2026"
          echo "═══════════════════════════════════════════════════════════════"